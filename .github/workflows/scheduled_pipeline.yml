name: Scheduled Pipeline Run

on:
  schedule:
    - cron: '0 2 * * *'
  
  workflow_dispatch:

concurrency:
  group: scheduled-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      BIGQUERY_DATASET: ${{ secrets.BIGQUERY_DATASET }}
      BIGQUERY_KEYFILE: ${{ secrets.BIGQUERY_KEYFILE }}
      DBT_PROFILES_DIR: ./
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      # === Bronze Layer: Ingestion ===
      - name: Ingest GitHub data to BigQuery (Bronze)
        run: python bigquery_loader.py
      
      # === Silver + Gold Layer: dbt ===
      - name: Install dbt packages
        run: dbt deps
        working-directory: ./dbt_github
      
      - name: Run dbt build (production)
        run: dbt build --target prod --fail-fast
        working-directory: ./dbt_github
      
    